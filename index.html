<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smart Reader</title>
  <style>
    :root {
      --bg-color: #f2f2f7;
      --card-bg: #ffffff;
      --primary: #007aff;
      --text-main: #1c1c1e;
      --text-muted: #8e8e93;
      --border: #e5e5ea;
      --highlight: #ffe066;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      margin: 0; padding: 0;
      background-color: var(--bg-color); color: var(--text-main);
      display: flex; flex-direction: column; height: 100vh; height: 100dvh;
      overflow: hidden;
    }

    /* Верхняя панель (Header) */
    header {
      background: var(--card-bg); padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border); z-index: 10;
    }
    .header-title { font-size: 1.1em; font-weight: 700; margin: 0; }
    .header-controls { display: flex; gap: 10px; }
    
    .btn-icon {
      background: none; border: none; font-size: 1.5em; color: var(--primary);
      padding: 4px; cursor: pointer; border-radius: 50%;
    }
    
    .file-upload-label {
      background: var(--primary); color: white; padding: 6px 12px;
      border-radius: 16px; font-size: 0.85em; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    input[type="file"] { display: none; }

    /* Основной контент (Вкладки) */
    .tab-content {
      flex-grow: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px;
      display: none;
    }
    .tab-content.active { display: block; }

    /* Вкладка: Книга */
    #text-container { font-size: 1.2em; line-height: 1.6; }
    .word { border-radius: 4px; transition: background 0.1s; cursor: pointer;}
    .highlight { background-color: var(--highlight); color: #000; box-shadow: 0 0 4px var(--highlight); }

    /* Вкладка: Чат */
    #chat-history {
      display: flex; flex-direction: column; gap: 12px; margin-bottom: 60px;
    }
    .msg { padding: 12px 16px; border-radius: 18px; font-size: 0.95em; max-width: 85%; line-height: 1.4; }
    .msg-user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg-ai { background: var(--card-bg); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg-sys { text-align: center; font-size: 0.85em; color: var(--text-muted); align-self: center; background: none; border: none; }

    .chat-input-wrapper {
      position: absolute; bottom: 70px; left: 0; right: 0;
      padding: 10px 16px; background: var(--bg-color);
      display: flex; gap: 8px; align-items: flex-end;
    }
    #user-input {
      flex-grow: 1; padding: 12px 16px; border: 1px solid var(--border);
      border-radius: 20px; font-family: inherit; resize: none; font-size: 1em;
      max-height: 100px; outline: none; background: var(--card-bg);
    }
    #send-btn {
      background: var(--primary); color: white; border: none;
      width: 44px; height: 44px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 1.2em; cursor: pointer;
    }

    /* Плавающий плеер */
    .floating-player {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
      border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 8px 24px; border-radius: 30px; display: flex; gap: 15px; z-index: 100;
    }
    .player-btn {
      background: none; border: none; font-size: 1.5em; color: var(--text-main);
      cursor: pointer; padding: 5px; width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
    }
    .player-btn:disabled { color: var(--border); }
    #play-btn { color: var(--primary); }

    /* Нижняя навигация (Bottom Nav) */
    nav {
      background: var(--card-bg); display: flex; justify-content: space-around;
      padding: 10px 0; padding-bottom: calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border); position: fixed; bottom: 0; width: 100%; z-index: 50;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      color: var(--text-muted); font-size: 0.75em; font-weight: 500; cursor: pointer;
    }
    .nav-item.active { color: var(--primary); }
    .nav-icon { font-size: 1.4em; }

    /* Модальное окно настроек */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 200; display: none;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: var(--bg-color); width: 100%; max-height: 90vh;
      border-radius: 20px 20px 0 0; padding: 20px; overflow-y: auto;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; font-weight: 600; font-size: 1.2em;
    }
    
    .settings-group {
      background: var(--card-bg); border-radius: 12px; padding: 16px; margin-bottom: 16px;
    }
    .settings-group label { display: block; font-size: 0.85em; color: var(--text-muted); margin-bottom: 6px; }
    .settings-group select, .settings-group input {
      width: 100%; padding: 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 1em; background: var(--bg-color); margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-title">Smart Reader</div>
    <div class="header-controls">
      <label for="file-input" class="file-upload-label">
        <span style="margin-right:5px;">📁</span> Книга
      </label>
      <input type="file" id="file-input" accept=".txt">
      <button class="btn-icon" onclick="toggleModal(true)">⚙️</button>
    </div>
  </header>

  <main id="tab-reader" class="tab-content active">
    <div id="text-container">
      <i>Загрузите текстовый файл. Чтение начнется мгновенно.</i>
    </div>
  </main>

  <main id="tab-chat" class="tab-content">
    <div id="chat-history">
      <div class="msg msg-sys">Чат с книгой. Задайте вопрос по сюжету.</div>
    </div>
    <div class="chat-input-wrapper">
      <textarea id="user-input" rows="1" placeholder="Ваш вопрос..."></textarea>
      <button id="send-btn">➤</button>
    </div>
  </main>

  <div class="floating-player">
    <button id="pause-btn" class="player-btn" style="display:none;">⏸</button>
    <button id="play-btn" class="player-btn" disabled>▶</button>
  </div>

  <nav>
    <div id="nav-reader" class="nav-item active" onclick="switchTab('reader')">
      <span class="nav-icon">📖</span>
      <span>Читать</span>
    </div>
    <div id="nav-chat" class="nav-item" onclick="switchTab('chat')">
      <span class="nav-icon">💬</span>
      <span>Обсудить</span>
    </div>
  </nav>

  <div class="modal-overlay" id="settings-modal" onclick="if(event.target===this) toggleModal(false)">
    <div class="modal-content">
      <div class="modal-header">
        <span>Настройки</span>
        <button class="btn-icon" onclick="toggleModal(false)">✖</button>
      </div>
      
      <div class="settings-group">
        <label>Кодировка файла:</label>
        <select id="encoding-select">
          <option value="UTF-8">UTF-8</option>
          <option value="windows-1251">Win-1251 (Старая кириллица)</option>
        </select>

        <label>Голос диктора (Yandex):</label>
        <select id="reader-voice">
          <option value="filipp">Филипп (Мужской)</option>
          <option value="madirus">Мадирус (Мужской)</option>
          <option value="alena">Алена (Женский)</option>
        </select>
      </div>

      <div class="settings-group">
        <label>ИИ Провайдер (Для чата):</label>
        <select id="llm-provider">
          <option value="gemini">Google Gemini</option>
          <option value="openai">OpenAI</option>
          <option value="openrouter">OpenRouter</option>
        </select>

        <label>API Ключ:</label>
        <input type="password" id="llm-key" placeholder="Вставьте ключ...">

        <label>Модель:</label>
        <input type="text" id="llm-model" value="gemini-2.5-flash">
      </div>
    </div>
  </div>

  <script>
    // --- UI Логика ---
    function switchTab(tabName) {
      // Скрываем все вкладки и снимаем выделение со всех кнопок
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      
      // Включаем нужную вкладку и подсвечиваем нужную кнопку по её ID
      document.getElementById(`tab-${tabName}`).classList.add('active');
      document.getElementById(`nav-${tabName}`).classList.add('active');
    }

    function toggleModal(show) {
      document.getElementById('settings-modal').classList.toggle('active', show);
    }

    // Авто-высота поля ввода в чате
    const tx = document.getElementById('user-input');
    tx.setAttribute('style', 'height:' + (tx.scrollHeight) + 'px;overflow-y:hidden;');
    tx.addEventListener("input", function () {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    });

    document.getElementById('llm-provider').addEventListener('change', (e) => {
      const modelInput = document.getElementById('llm-model');
      if(e.target.value === 'openai') modelInput.value = 'gpt-4o-mini';
      if(e.target.value === 'gemini') modelInput.value = 'gemini-2.5-flash';
      if(e.target.value === 'openrouter') modelInput.value = 'anthropic/claude-3-haiku';
    });


    // --- ПЛЕЕР И ТЕКСТ ---
    let wordsArray = [];
    let wordSpans = [];
    let currentWordIndex = 0;
    let isPlaying = false;
    let currentAudio = null;

    const container = document.getElementById('text-container');
    const playBtn = document.getElementById('play-btn');
    const pauseBtn = document.getElementById('pause-btn');
    
    async function synthesizeYandex(text, voice) {
      // ВНИМАНИЕ: Адрес локального сервера. Для GitHub Pages нужно менять!
      const response = await fetch("http://127.0.0.1:5000/synthesize", {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, voice: voice })
      });
      if(!response.ok) throw new Error("Ошибка синтеза");
      const blob = await response.blob();
      return URL.createObjectURL(blob);
    }

    document.getElementById('file-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        if(currentAudio) { currentAudio.pause(); isPlaying = false; }
        wordsArray = ev.target.result.replace(/\s+/g, ' ').trim().split(' ');
        container.innerHTML = wordsArray.map((w, i) => `<span class="word" data-index="${i}">${w}</span>`).join(' ');
        wordSpans = document.querySelectorAll('.word');
        currentWordIndex = 0;
        playBtn.disabled = false;
        switchTab('reader'); // Переключаем на чтение при загрузке
      };
      reader.readAsText(file, document.getElementById('encoding-select').value);
    });

    async function playChunk() {
      if (!isPlaying || currentWordIndex >= wordsArray.length) {
        isPlaying = false; playBtn.style.display = 'block'; pauseBtn.style.display = 'none'; return;
      }

      let endIndex = currentWordIndex + 15;
      while (endIndex < wordsArray.length - 1 && !['.', '!', '?', ';', '»'].some(char => wordsArray[endIndex].includes(char))) {
        endIndex++;
        if (endIndex - currentWordIndex > 40) break;
      }
      endIndex = Math.min(endIndex, wordsArray.length - 1);

      const chunkText = wordsArray.slice(currentWordIndex, endIndex + 1).join(' ');
      const voice = document.getElementById('reader-voice').value;

      wordSpans.forEach(s => s.classList.remove('highlight'));
      for(let i = currentWordIndex; i <= endIndex; i++) {
         if(wordSpans[i]) wordSpans[i].classList.add('highlight');
      }
      
      // Плавная прокрутка с учетом плавающего плеера
      if(wordSpans[currentWordIndex]) {
        const y = wordSpans[currentWordIndex].getBoundingClientRect().top + window.scrollY - 100;
        window.scrollTo({top: y, behavior: 'smooth'});
      }

      try {
        const url = await synthesizeYandex(chunkText, voice);
        currentAudio = new Audio(url);
        await new Promise((res, rej) => { 
          currentAudio.onended = res; currentAudio.onerror = rej; currentAudio.play(); 
        });
        currentWordIndex = endIndex + 1;
        if (isPlaying) playChunk();
      } catch (e) {
        console.error("Ошибка аудио", e);
        isPlaying = false;
        playBtn.style.display = 'block'; pauseBtn.style.display = 'none';
        alert("Ошибка озвучки. Проверьте запущен ли локальный сервер (127.0.0.1:5000)");
      }
    }

    playBtn.onclick = () => { isPlaying = true; playBtn.style.display = 'none'; pauseBtn.style.display = 'block'; playChunk(); };
    pauseBtn.onclick = () => { isPlaying = false; if(currentAudio) currentAudio.pause(); playBtn.style.display = 'block'; pauseBtn.style.display = 'none'; };
    
    container.addEventListener('click', (e) => {
      if (e.target.classList.contains('word')) {
        isPlaying = false; if(currentAudio) currentAudio.pause();
        currentWordIndex = parseInt(e.target.getAttribute('data-index'));
        wordSpans.forEach(s => s.classList.remove('highlight'));
        e.target.classList.add('highlight');
        playBtn.style.display = 'block'; pauseBtn.style.display = 'none';
      }
    });

    // --- ЧАТ И УНИВЕРСАЛЬНЫЙ API ---
    const chatHistoryUI = document.getElementById('chat-history');
    const userInput = document.getElementById('user-input');
    let chatContext = [];

    function addMessageUI(text, isUser) {
      const div = document.createElement('div');
      div.className = `msg ${isUser ? 'msg-user' : 'msg-ai'}`;
      div.textContent = text;
      chatHistoryUI.appendChild(div);
      // Скролл в самый низ чата
      const chatTab = document.getElementById('tab-chat');
      chatTab.scrollTop = chatTab.scrollHeight;
    }

    async function sendToAPI(provider, key, model, sysPrompt, message) {
      let url, headers, body;

      if (provider === 'openai' || provider === 'openrouter') {
        url = provider === 'openai' ? "https://api.openai.com/v1/chat/completions" : "https://openrouter.ai/api/v1/chat/completions";
        headers = { "Content-Type": "application/json", "Authorization": `Bearer ${key}` };
        if (provider === 'openrouter') { headers["HTTP-Referer"] = window.location.href; headers["X-Title"] = "Smart Reader"; }
        
        body = JSON.stringify({
          model: model,
          messages: [{role: "system", content: sysPrompt}, ...chatContext, {role: "user", content: message}]
        });
      } 
      else if (provider === 'gemini') {
        url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
        headers = { "Content-Type": "application/json" };
        let contents = chatContext.map(m => ({ role: m.role === 'assistant' ? 'model' : 'user', parts: [{text: m.content}] }));
        contents.push({ role: 'user', parts: [{text: message}] });
        body = JSON.stringify({ systemInstruction: { parts: [{ text: sysPrompt }] }, contents: contents });
      }

      const res = await fetch(url, { method: "POST", headers, body });
      if (!res.ok) throw new Error(`Ошибка API: ${res.status}`);
      const data = await res.json();
      return provider === 'gemini' ? data.candidates[0].content.parts[0].text : data.choices[0].message.content;
    }

    document.getElementById('send-btn').onclick = async () => {
      const q = userInput.value.trim();
      if (!q) return;
      
      const provider = document.getElementById('llm-provider').value;
      const key = document.getElementById('llm-key').value;
      const model = document.getElementById('llm-model').value;
      
      if(!key) { alert("Пожалуйста, введите API ключ в настройках (⚙️)!"); return; }

      if(isPlaying) pauseBtn.click();

      userInput.value = "";
      userInput.style.height = 'auto'; // Сброс высоты
      addMessageUI(q, true);

      const start = Math.max(0, currentWordIndex - 200);
      const end = Math.min(wordsArray.length, currentWordIndex + 200);
      const bookContext = wordsArray.slice(start, end).join(' ');

      const sysPrompt = `Ты интеллектуальный помощник при чтении книги. Пользователь остановился здесь:\n"${bookContext}"\n\nОтвечай коротко и помогай понять сюжет.`;

      const aiMsgDiv = document.createElement('div');
      aiMsgDiv.className = 'msg msg-ai';
      aiMsgDiv.textContent = "Печатает...";
      chatHistoryUI.appendChild(aiMsgDiv);
      document.getElementById('tab-chat').scrollTop = document.getElementById('tab-chat').scrollHeight;

      try {
        const answer = await sendToAPI(provider, key, model, sysPrompt, q);
        aiMsgDiv.textContent = answer;
        
        chatContext.push({role: "user", content: q});
        chatContext.push({role: "assistant", content: answer});
        if(chatContext.length > 6) chatContext = chatContext.slice(-6);

        const voice = document.getElementById('reader-voice').value;
        const url = await synthesizeYandex(answer, voice);
        currentAudio = new Audio(url);
        currentAudio.play();

      } catch (e) {
        aiMsgDiv.textContent = "❌ Ошибка соединения. Проверьте ключ или модель.";
        console.error(e);
      }
    };
  </script>
</body>
</html>
